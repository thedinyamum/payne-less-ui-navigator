name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > painlessui-navigator.jks
          cat <<EOF > keystore.properties
          storeFile=$(pwd)/painlessui-navigator.jks
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          EOF

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p dist
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          cp "$APK" dist/payne-less-ui-navigator.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Payne-less UI Navigator ${{ github.ref_name }}
          body: |
            ## Payne-less UI: Navigator ${{ github.ref_name }}

            A lightweight accessibility service replacing OEM navigation gestures.

            ### Install
            1. Download `payne-less-ui-navigator.apk` below
            2. `adb install payne-less-ui-navigator.apk`  
               — or sideload via your file manager
            3. **Settings → Accessibility → Painless UI: Navigator** → Enable
            4. Disable your OEM gesture/navigation app

            ### Resource Usage
            - APK size: ~22.75 KB  
            - RAM: ~5 MB (PSS)  
            - No launcher icon, no activities

            See [README](https://github.com/thedinyamum/payne-less-ui-navigator#readme) for tuning and build instructions.
          files: dist/payne-less-ui-navigator.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
