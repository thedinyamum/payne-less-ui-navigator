name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "${{ github.workspace }}/painlessui-navigator.jks"

      - name: Verify JKS integrity
        run: |
          echo "=== JKS file size ==="
          wc -c "${{ github.workspace }}/painlessui-navigator.jks"
          echo "=== JKS SHA256 ==="
          sha256sum "${{ github.workspace }}/painlessui-navigator.jks"
          echo "=== keytool list (password masked by GH Actions) ==="
          keytool -list \
            -keystore "${{ github.workspace }}/painlessui-navigator.jks" \
            -storepass "${{ secrets.KEYSTORE_STORE_PASSWORD }}" \
            -v 2>&1 | grep -E '(Keystore type|Your keystore contains|Alias name|Error|Exception)'
          echo "=== password byte length ==="
          printf '%s' "${{ secrets.KEYSTORE_STORE_PASSWORD }}" | wc -c

      - name: Build signed release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="${{ github.workspace }}/painlessui-navigator.jks" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEYSTORE_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEYSTORE_KEY_PASSWORD }}"

      - name: Clean up keystore
        if: always()
        run: rm -f "${{ github.workspace }}/painlessui-navigator.jks"

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             payne-less-ui-navigator.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Payne-less UI Navigator ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: payne-less-ui-navigator.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
